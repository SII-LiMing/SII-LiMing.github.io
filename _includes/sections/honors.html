<style>
.award-list {
  margin-top: 1rem;
}
.award-item {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 1.4rem;
  padding: 1.2rem 0;
  border-top: 1px solid var(--global-border-color);
}
.award-item:last-child {
  border-bottom: 1px solid var(--global-border-color);
}
.award-year {
  font-size: 1rem;
  font-weight: 700;
  color: #8c8c8c;
}
.award-text {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #222;
}
@media (max-width: 700px) {
  .award-item {
    grid-template-columns: 1fr;
    gap: 0.35rem;
  }
}
</style>

<div class="award-list">
  {% for item in site.data.honors %}
    <div class="award-item">
      <div class="award-year">{{ item.year }}</div>
      <div class="award-text">{{ item.text }}</div>
    </div>
  {% endfor %}
</div>
